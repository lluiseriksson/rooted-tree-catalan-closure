name: tagged-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: tagged-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install TeX and PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-science lmodern poppler-utils
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          export PYTHONPATH="$PWD/scripts"
          python - <<'PY'
          import os
          from pathlib import Path
          from strict_json import load_canonical

          version = load_canonical(Path('project.json'))['version']
          tag = os.environ['GITHUB_REF_NAME']
          if tag != f'v{version}':
              raise SystemExit(f'tag {tag!r} does not match v{version}')
          PY
      - name: Complete publication gate
        run: make release
      - name: Create and verify full-history recovery bundle
        run: |
          make history-bundle
          python scripts/verify_history_bundle.py --release-dir history-release
      - name: Attest source archive
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release/*.zip
      - name: Attest SPDX SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release/*.spdx.json
      - name: Attest history bundle
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: history-release/*.bundle
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* history-release/* --verify-tag --generate-notes
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tagged-release-files
          path: |
            release/*
            history-release/*
          if-no-files-found: error
          retention-days: 90
