name: artifact

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  audit-and-package:
    name: Audit and deterministic source package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Static artifact audit
        run: python scripts/audit_artifact.py
      - name: Deterministic source package
        run: python scripts/package_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: rooted-tree-catalan-closure-source
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error

  paper:
    name: Paper build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-science latexmk
      - name: Build paper
        run: make paper
      - uses: actions/upload-artifact@v4
        with:
          name: rooted-tree-catalan-closure-pdf
          path: Rooted_tree_Catalan_closure.pdf
          if-no-files-found: error
