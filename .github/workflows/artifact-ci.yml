name: artifact-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: artifact-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  UPSTREAM_SHA: 1d044a353ac2b69ddca732dd851fb0ab4a94d7af
  LEAN_TOOLCHAIN: leanprover/lean4:v4.29.0-rc6
  MATHLIB_SHA: 07642720480157414db592fa85b626dafb71355b

jobs:
  static-and-package:
    name: Integrity, finite evidence, and deterministic release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Audit, test, and replay finite Catalan evidence
        run: make ci
      - name: Prove package determinism
        run: make package-determinism
      - name: Prove extracted-source repackaging
        run: make package-repackaging
      - name: Verify source ZIP without host permission assumptions
        run: make verify-source-zip
      - name: Build and independently verify release outputs
        run: make verify-release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rooted-tree-catalan-closure-release
          path: |
            release/*
            evidence/finite-catalan-checks.json
            archive/theorem-manifest.json
          if-no-files-found: error
          retention-days: 30


  tooling-matrix:
    name: Tooling on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Standard-library test suite
        run: python -m unittest discover -s tests -v
      - name: Portable finite Catalan smoke check
        run: >-
          python scripts/check_finite_catalan.py
          --max-n 6 --graph-max-n 5 --no-evidence-check

  patch-application:
    name: Patch applies to immutable upstream base
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out recovered artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: artifact
          persist-credentials: false
      - name: Check out exact upstream base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: lluiseriksson/THE-ERIKSSON-PROGRAMME
          ref: 1d044a353ac2b69ddca732dd851fb0ab4a94d7af
          path: upstream
          persist-credentials: false
      - name: Verify upstream pins
        working-directory: upstream
        run: |
          test "$(git rev-parse HEAD)" = "$UPSTREAM_SHA"
          test "$(tr -d '\r\n' < lean-toolchain)" = "$LEAN_TOOLCHAIN"
          grep -Fq "$MATHLIB_SHA" lake-manifest.json
      - name: Check and apply mailbox patch
        working-directory: upstream
        run: |
          git apply --check ../artifact/lean-patch/catalan-conditional-adapter.patch
          git apply ../artifact/lean-patch/catalan-conditional-adapter.patch
          git diff --check
      - name: Compare recovered adapter sources
        run: |
          cmp upstream/YangMills/KP/RootedCatalan.lean artifact/lean-patch/YangMills/KP/RootedCatalan.lean
          cmp upstream/YangMills/RG/AppendixFHsharpCatalanClosure.lean artifact/lean-patch/YangMills/RG/AppendixFHsharpCatalanClosure.lean
          cmp upstream/YangMills/RG/AppendixFHsharpCatalanSource.lean artifact/lean-patch/YangMills/RG/AppendixFHsharpCatalanSource.lean
          cmp upstream/oracle_check_catalan.lean artifact/lean-patch/oracle_check_catalan.lean

  paper:
    name: Rebuild and inspect manuscript PDF
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install TeX and PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-science lmodern poppler-utils
      - name: Build and inspect paper without modifying tracked PDF
        run: make paper-check
      - name: Confirm tracked recovered PDF remains unchanged
        run: git diff --exit-code -- Rooted_tree_Catalan_closure.pdf
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rebuilt-manuscript
          path: build/Rooted_tree_Catalan_closure.pdf
          if-no-files-found: error
          retention-days: 30
